services:
  - type: web
    name: placement-prep-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: AI_PROVIDER
        value: openrouter
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: openai/gpt-4o-mini
      - key: FRONTEND_URL
        sync: false
